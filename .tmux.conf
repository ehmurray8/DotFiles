# Set prefix to Ctrl-a and unbind Ctrl-b
set -g prefix C-a
unbind C-b

# Set the key recognition time low
set -s escape-time 0

# Set base numbering to 1
set -g base-index 1
set -g pane-base-index 1

# History limit
set -g history-limit 20000

# Don't rename windows
setw -g allow-rename off
setw -g automatic-rename off

# Reload tmux conf with prefix - r
unbind r
bind r source-file ~/.tmux.conf\; display "Reloaded!"

# Ctrl-a twice sends Ctrl-a to the opened program
bind C-a send-prefix

# Intuitive window binding keys, and open new panes in current path
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Allow opening of new panes in current path
bind c new-window -c '#{pane_current_path}'

# Move around panes with vim navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize window panes with capital vim key navigation keys
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

bind f run-shell "tmux neww ~/.scripts/tmux-sessionizer"

# Use vi key bindings to navigate buffer when in scroll mode
setw -g mode-keys vi
set -g status-keys vi

bind e command-prompt -p "session abbr:" "run 'tmux switch -t $(tmux ls -F \"##{session_created}:##{session_name}\" | sort -n | grep -i %% | head -n 1 | cut -d \':\' -f 2)'"

###
# Plugins
###

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Restores tmux on reboot
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Continuous saving of tmux session
set -g @plugin 'tmux-plugins/tmux-continuum'


### 
# Theme
###
set -g allow-passthrough on
set -as terminal-features ',*:RGB'
set -as terminal-features ',*:hyperlinks'
set -g default-terminal "tmux-256color"

set -g allow-passthrough on


###
# Plugin configuration
###

# Restores vim sessions
set -g @resurrect-strategy-vim 'session'

# Restores neovim sessions
set -g @resurrect-strategy-nvim 'session'

# Last saved environment is automatically opened when tmux is opened
set -g @continuum-restore 'off'

# Use vi copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Use system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Allow mouse interactions
set -g mouse on

# Don't exit copy-mode or clear selection on mouse up
unbind -T copy-mode-vi MouseDragEnd1Pane

# Set utf 8
setw -q -g utf8 on

# renumber windows when a window is closed
set -g renumber-windows on 

# Message display time
set -g display-panes-time 800 
set -g display-time 1000

####################### Status Bar ####################################

# --- General Settings ---
set -g status-interval 5
set -g status-style "bg=default,fg=default"

# --- Window List ---
set -g window-status-separator ""

# Inactive window format
set -g window-status-format "#[fg=colour244] #I:#W "

# Active window format (includes 🔍 icon if pane is zoomed)
set -g window-status-current-format \
"#[fg=colour39,bold]#[fg=colour231,bg=colour39] #I:#W#{?window_zoomed_flag, 🔍,} #[fg=colour39,bg=default]"

# --- Left Side (Session Name) ---
set -g status-left-length 40
set -g status-left "#[fg=colour81,bold]   #S "

# --- Right Side (Truncated Path | Git | Prefix) ---
set -g status-right-length 150

# Logic Breakdown:
# 1. Path: Uses 'sed' to turn /home/user/code/into ~/c/
# 2. Git: Checks branch name
# 3. Dirty: Adds red dot (●) if changes exist
# 4. Prefix: Shows ⌨ icon only when prefix is pressed
# Right side with sanitized path shortening
set -g status-right "#[fg=colour245]  #(echo '#{pane_current_path}' | sed \"s|$HOME|~|\" | sed 's|\\([^/][^/]\\)[^/]*/|\\1/|g') \
#[fg=colour244]│ \
#[fg=colour214] #(GIT_OPTIONAL_LOCKS=0 git -C #{pane_current_path} symbolic-ref --short HEAD 2>/dev/null)\
#(cd #{pane_current_path} && GIT_OPTIONAL_LOCKS=0 git diff-index --quiet HEAD -- 2>/dev/null || echo ' #[fg=colour197]●') \
#[fg=colour244]#{?client_prefix, │ #[fg=colour39]⌨ ,}"


# --- Pane Borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Messages ---
set -g message-style "fg=colour39,bg=default"

####################### Status Bar ####################################

# move to last active window
bind Tab last-window 

bind-key    -T root         MouseDrag1Pane       if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
bind-key    -T root         WheelUpPane          if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }
bind-key    -T copy-mode    WheelUpPane          select-pane \; send-keys -X -N 5 scroll-up
bind-key    -T copy-mode    WheelDownPane        select-pane \; send-keys -X -N 5 scroll-down

bind-key    -T copy-mode    MouseDrag1Pane       select-pane \; send-keys -X begin-selection
bind-key    -T copy-mode    MouseDragEnd1Pane    send-keys -X stop-selection
bind-key    -T copy-mode    MouseDown1Pane    send-keys -X clear-selection

# bind-key -n C-f display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse --header 'Jump to Session' --preview 'tmux list-windows -t {}' | xargs -r tmux switch-client -t"

# Prefix l to go to last session
bind l switch-client -l

# Ctrl + F to view current sessions
bind-key -n C-f display-popup -E "tmux switch-client -t \$(tmux list-sessions -F '#{session_name}' | fzf --reverse --header 'Jump to Session')"

# Install plugins
run -b '~/.tmux/plugins/tpm/tpm'
